<!DOCTYPE html><html lang='en'><head>
<meta charset='UTF-8'>
<title>SHIELD Security Log Report</title>
<link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap' rel='stylesheet'>
<style>
:root {
  --text-main: #000000;
  --text-muted: #555555;
  --border: #cccccc;
  --bg-alt: #f4f4f4;
}
@page { margin: 20mm; size: A4 portrait; }
body { font-family: 'Inter', sans-serif; color: var(--text-main); margin: 0; padding: 0; background: #fff; line-height: 1.5; }
.report-container { max-width: 800px; margin: 0 auto; padding: 20px; }
.header { border-bottom: 2px solid var(--text-main); padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; }
.header-left h1 { margin: 0 0 5px 0; font-size: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.header-left .meta { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.header-right { text-align: right; }
.report-time { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; border: 1px solid var(--border); padding: 5px 10px; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th, td { padding: 10px 12px; text-align: left; font-size: 12px; border-bottom: 1px solid var(--border); }
th { background-color: var(--bg-alt); font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
.student-name { font-weight: 600; font-size: 13px; }
.rank-roll { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--text-muted); }
.data-mono { font-family: 'JetBrains Mono'; }
.bunk { font-weight: 700; font-size: 13px; }
.footer { margin-top: 40px; text-align: center; font-size: 10px; color: var(--text-muted); border-top: 1px solid var(--border); padding-top: 15px; }
</style></head><body>
<div class='report-container'>
<div class='header'>
  <div class='header-left'>
    <h1>SHIELD LOG REPORT</h1>
    <div class='meta'>Secure Hardware Interface // Daily Bunk Summary</div>
  </div>
  <div class='header-right'>
    <div class='report-time'>GENERATED: 0850hrs</div>
  </div>
</div>
<table id='reportTable'><thead><tr>
<th>Rank</th><th>Roll #</th><th>Student Name</th><th>Entries</th><th>Exits</th><th>Total Bunks</th><th>Total Bunk Dur.</th><th>Last Bunk Details</th>
</tr></thead><tbody>
</tbody></table>
<div class='footer'>Report auto-generated by SHIELD System v14.0 &bull; Official Security Record</div>
</div>
<script>
const students = [
{
roll: " 0 ",
name: '" 0 "',
entries: " 0 ",
exits: " 0 ",
bunks: " 0 ",
totalDur: " 0 ",
lastDur: " 0 ",
lastExit: '" + formatMilitaryTime(s.lastExitTime) + "',
lastEntry: '" + formatMilitaryTime(s.lastEntryTime) + "',
isInside: " 0 ",
bunkStart: '" + formatMilitaryTime(s.currentBunkStart > 0 ? s.currentBunkStart : 0) + "'
}
];
function formatDur(secs) {

    if(secs === 0) return '--';

    let m = Math.floor(secs / 60);

    let s = secs % 60;

    return m + 'm ' + s + 's';

}

window.onload = function() {

    students.sort((a,b) => {

       if(b.totalDur !== a.totalDur) return b.totalDur - a.totalDur;

       return b.bunks - a.bunks;

    });

    let tbody = document.querySelector('#reportTable tbody');

    let html = '';

    let rank = 1;

    for(let s of students) {

       let rStr = s.bunks > 0 ? '#' + rank : '--';

       html += `<tr>
          <td class='data-mono'><b>${rStr}</b></td>
          <td class='rank-roll'>${String(s.roll).padStart(2, '0')}</td>
          <td class='student-name'>${s.name}</td>
          <td class='data-mono'>${s.entries}</td>
          <td class='data-mono'>${s.exits}</td>
          <td class='data-mono bunk'>${s.bunks}</td>
          <td class='data-mono'>${formatDur(s.totalDur)}</td>
          <td class='data-mono'>${formatDur(s.lastDur)}</td>
       </tr>`;

       if(s.bunks > 0) rank++;

    }

    tbody.innerHTML = html;

    window.print();

}

</script>
</body></html>
